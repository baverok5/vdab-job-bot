<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>Jobs — apply in one tap</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#246bce">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jobs">

<style>
  :root {
    --bg: #f6f6f4; --card: #ffffff; --border: #e6e4df; --border2: #efede8;
    --text: #1c1c1a; --text2: #63625d; --text3: #94928b;
    --accent: #1c5abf; --accent2: #3a86e6; --accent-bg: #e8f1fc;
    --green: #0f6e56; --green-bg: #e2f5ee;
    --amber: #9a6a12; --amber-bg: #f8efdb;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 6px 16px rgba(0,0,0,.05);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141413; --card: #201f1e; --border: #35342f; --border2: #2a2926;
      --text: #efede8; --text2: #a8a69f; --text3: #78766f;
      --accent: #8fbdf1; --accent2: #3a86e6; --accent-bg: #123056;
      --green: #5dcaa5; --green-bg: #0c463799;
      --amber: #e0b667; --amber-bg: #3a2e1499;
      --shadow: 0 1px 2px rgba(0,0,0,.2), 0 8px 20px rgba(0,0,0,.28);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.5; padding-bottom: env(safe-area-inset-bottom);
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 0 12px 40px; }

  header {
    position: sticky; top: 0; z-index: 20;
    background: color-mix(in srgb, var(--bg) 86%, transparent);
    backdrop-filter: saturate(1.4) blur(12px);
    -webkit-backdrop-filter: saturate(1.4) blur(12px);
    padding: calc(env(safe-area-inset-top) + 12px) 0 8px;
    border-bottom: 0.5px solid var(--border2);
  }
  .hbar { max-width: 560px; margin: 0 auto; padding: 0 14px;
    display: flex; align-items: center; gap: 10px; }
  .logo { width: 30px; height: 30px; border-radius: 8px; flex: none;
    background: linear-gradient(160deg, #3a86e6, #1c5abf);
    display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 17px; }
  .htext h1 { font-size: 18px; font-weight: 700; letter-spacing: -.01em; }
  .htext .sub { font-size: 11.5px; color: var(--text3); margin-top: 1px; }
  .install {
    margin-left: auto; font: inherit; font-size: 12.5px; font-weight: 600;
    color: #fff; background: var(--accent2); border: none; border-radius: 8px;
    padding: 7px 12px; cursor: pointer; display: none;
  }

  .tabs { display: flex; gap: 4px; background: var(--card); border: 0.5px solid var(--border);
    border-radius: 11px; padding: 4px; margin: 14px 0 4px; box-shadow: var(--shadow); }
  .tab { flex: 1; text-align: center; font-size: 12.5px; font-weight: 600; color: var(--text2);
    padding: 8px 2px; border-radius: 8px; cursor: pointer; border: none; background: transparent;
    white-space: nowrap; }
  .tab.on { background: var(--accent-bg); color: var(--accent); }
  .tab .n { font-size: 10.5px; opacity: .7; margin-left: 2px; }

  .list { margin-top: 12px; }
  .card { background: var(--card); border: 0.5px solid var(--border); border-radius: 14px;
    padding: 14px; margin-bottom: 11px; box-shadow: var(--shadow); overflow: hidden; }
  .top { display: flex; gap: 10px; align-items: flex-start; cursor: pointer; }
  .title { font-size: 15.5px; font-weight: 650; letter-spacing: -.01em; line-height: 1.32; }
  .co { font-size: 13px; color: var(--text2); margin-top: 3px; }
  .score { flex: none; background: var(--accent-bg); color: var(--accent);
    font-size: 13px; font-weight: 700; border-radius: 9px; padding: 5px 9px; }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .tag { font-size: 11px; padding: 3px 9px; border-radius: 20px; background: var(--bg);
    border: 0.5px solid var(--border); color: var(--text2); }
  .tag.new { background: var(--green-bg); color: var(--green); border-color: transparent; font-weight: 600; }
  .tag.mail { background: var(--accent-bg); color: var(--accent); border-color: transparent; font-weight: 600; }
  .tag.applied { background: var(--green-bg); color: var(--green); border-color: transparent; font-weight: 700; }

  .body { max-height: 0; opacity: 0; transition: max-height .28s ease, opacity .2s ease; }
  .card.open .body { max-height: 3000px; opacity: 1; margin-top: 13px;
    border-top: 0.5px solid var(--border2); padding-top: 13px; }
  .sec { margin-bottom: 13px; }
  .sec .h { font-size: 10.5px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; color: var(--text3); margin-bottom: 5px; }
  .sec .t { font-size: 13.5px; color: var(--text2); white-space: pre-wrap; }
  .bl { margin: 0; padding-left: 18px; }
  .bl li { font-size: 13.5px; color: var(--text2); line-height: 1.55; margin-bottom: 4px; }
  .quote { background: var(--bg); border: 0.5px solid var(--border2);
    border-left: 2.5px solid var(--accent2); border-radius: 0 9px 9px 0;
    padding: 10px 12px; font-size: 13px; color: var(--text); white-space: pre-wrap; }
  .copybtn { font: inherit; font-size: 11.5px; font-weight: 600; color: var(--text2);
    background: transparent; border: 0.5px solid var(--border); border-radius: 7px;
    padding: 5px 10px; margin-top: 7px; cursor: pointer; }

  .actions { display: flex; gap: 8px; margin-top: 14px; }
  .btn { flex: 1; font: inherit; font-size: 14px; font-weight: 600; text-align: center;
    text-decoration: none; border-radius: 10px; padding: 12px 14px; cursor: pointer;
    border: 0.5px solid var(--border); background: transparent; color: var(--text); }
  .btn.primary { flex: 2; border: none; color: #fff;
    background: linear-gradient(180deg, var(--accent2), var(--accent)); }
  .btn.undo { color: var(--amber); border-color: transparent; background: var(--amber-bg); }

  .filter { width: 100%; font: inherit; font-size: 14px; color: var(--text);
    background: var(--card); border: 0.5px solid var(--border); border-radius: 10px;
    padding: 11px 13px; margin: 4px 0 10px; box-shadow: var(--shadow); outline: none; }
  .filter:focus { border-color: var(--accent2); }
  .hint { font-size: 11.5px; color: var(--text3); text-align: center;
    margin-top: 10px; padding: 0 8px; }
  .cathead { display: flex; align-items: center; gap: 7px; margin: 20px 4px 9px;
    font-size: 12.5px; font-weight: 700; color: var(--text); letter-spacing: -.01em; }
  .cathead:first-child { margin-top: 6px; }
  .cathead .cnt { font-weight: 600; font-size: 11px; color: var(--text3); }
  .cathead.fav { color: var(--accent); }
  .cathead .rule { flex: 1; height: 1px; background: var(--border2); }
  .empty { text-align: center; color: var(--text3); font-size: 13.5px;
    padding: 46px 16px; }
  .empty .big { font-size: 26px; margin-bottom: 8px; }
  .toast { position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom) + 20px);
    transform: translateX(-50%) translateY(20px); background: #222; color: #fff;
    font-size: 13px; padding: 10px 16px; border-radius: 10px; opacity: 0;
    transition: all .25s ease; pointer-events: none; z-index: 50; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="hbar">
    <div class="logo">V</div>
    <div class="htext">
      <h1>Jobs</h1>
      <div class="sub" id="updated">Loading…</div>
    </div>
    <button class="install" id="install">Install app</button>
  </div>
</header>

<div class="wrap">
  <div class="tabs">
    <button class="tab on" data-tab="new">Ready <span class="n" id="c-new"></span></button>
    <button class="tab" data-tab="all">All jobs <span class="n" id="c-all"></span></button>
    <button class="tab" data-tab="rejected">Not a fit <span class="n" id="c-rejected"></span></button>
    <button class="tab" data-tab="applied">Applied <span class="n" id="c-applied"></span></button>
    <button class="tab" data-tab="skipped">Skipped <span class="n" id="c-skipped"></span></button>
  </div>

  <div class="list" id="list"><div class="empty">Loading jobs…</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const LS = "jobstatus";                       // { jobId: "applied" | "skipped" }
const getStatus = () => JSON.parse(localStorage.getItem(LS) || "{}");
const setStatus = (id, s) => {
  const m = getStatus();
  if (s === null) delete m[id]; else m[id] = s;
  localStorage.setItem(LS, JSON.stringify(m));
  render();
};

let DATA = { jobs: [], updated: "" };
let TAB = "new";
let SEARCH_Q = "";

const esc = (s) => (s || "").replace(/[&<>"]/g, (c) =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove("show"), 1800);
}

function gmailLink(j) {
  const to = encodeURIComponent(j.apply_email || "");
  const su = encodeURIComponent(j.email_subject || ("Application — " + (j.title || "")));
  const bo = encodeURIComponent(j.email_body || "");
  return `https://mail.google.com/mail/?view=cm&fs=1&to=${to}&su=${su}&body=${bo}`;
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text || "").then(() => toast("Copied to clipboard"));
}

const isToday = (str) =>
  (str || "").slice(0, 10) === new Date().toISOString().slice(0, 10);

function bullets(str) {
  const items = (str || "").split(/\n+/)
    .map((s) => s.replace(/^[-•*·\d.]+\s*/, "").trim())
    .filter(Boolean);
  if (!items.length) return "";
  return `<ul class="bl">${items.map((i) => `<li>${esc(i)}</li>`).join("")}</ul>`;
}

// ---- Phase 2: on-demand letter generation ----
const WK_LS = "workerUrl";
const getWorker = () => localStorage.getItem(WK_LS) || "";
function ensureWorker() {
  let w = getWorker();
  if (!w) {
    w = (prompt("One-time setup: paste your Cloudflare Worker URL for on-demand letters (see worker/README.md).") || "").trim();
    if (w) localStorage.setItem(WK_LS, w);
  }
  return w;
}

function gmailFor(j, d) {
  const to = encodeURIComponent(d.apply_email || j.apply_email || "");
  const su = encodeURIComponent(d.email_subject || ("Application — " + (j.title || "")));
  const bo = encodeURIComponent(d.email_body || "");
  return `https://mail.google.com/mail/?view=cm&fs=1&to=${to}&su=${su}&body=${bo}`;
}

function renderPrepared(j, d, box) {
  box.innerHTML = `
    <div class="sec"><div class="h">Application email</div>
      <div class="quote">${esc(d.email_subject ? d.email_subject + "\n\n" : "")}${esc(d.email_body)}</div></div>
    <div class="sec"><div class="h">Cover letter</div>
      <div class="quote">${esc(d.cover_letter)}</div></div>
    <a class="btn primary" href="${gmailFor(j, d)}" target="_blank" rel="noopener"
       onclick="try{localStorage.setItem('jobstatus', JSON.stringify(Object.assign(JSON.parse(localStorage.getItem('jobstatus')||'{}'), {'${j.id}':'applied'})))}catch(e){}">
       Open in Gmail to send</a>`;
}

async function prepareJob(j, box) {
  const worker = ensureWorker();
  if (!worker) { box.innerHTML = '<div class="hint">On-demand letters need the Worker set up first.</div>'; return; }
  box.innerHTML = '<div class="hint">Writing your letter… this takes ~1–2 min. You can leave and come back.</div>';
  try {
    const r = await fetch(worker, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ job_id: j.id, url: j.url }),
    });
    if (!r.ok) throw new Error("trigger " + r.status);
  } catch (e) {
    box.innerHTML = '<div class="hint">Could not start generation — check the Worker URL (tap again to re-enter it).</div>';
    localStorage.removeItem(WK_LS);
    return;
  }
  const started = Date.now();
  const poll = async () => {
    try {
      const pr = await fetch(`prepared/${j.id}.json?t=` + Date.now(), { cache: "no-store" });
      if (pr.ok) {
        const d = await pr.json();
        if (d.status === "ready") return renderPrepared(j, d, box);
        if (d.status === "error") { box.innerHTML = '<div class="hint">Couldn’t read this job to write a letter. Try “Open on VDAB”.</div>'; return; }
      }
    } catch {}
    if (Date.now() - started > 200000) { box.innerHTML = '<div class="hint">Still working — reopen this job in a minute to see the letter.</div>'; return; }
    setTimeout(poll, 4000);
  };
  setTimeout(poll, 8000);
}

function card(j, state) {
  const el = document.createElement("div");
  el.className = "card";
  const hasMail = !!j.apply_email;
  const applyLabel = hasMail ? "Apply by email" : "Apply on VDAB";
  const applyHref = hasMail ? gmailLink(j) : (j.url || "#");

  el.innerHTML = `
    <div class="top" data-act="toggle">
      <div style="flex:1">
        <div class="title">${esc(j.title)}</div>
        <div class="co">${esc(j.company)} · ${esc(j.location)}</div>
        <div class="tags">
          ${state === "applied" ? '<span class="tag applied">✓ Applied</span>' : ""}
          ${state !== "applied" && isToday(j.found_at) ? '<span class="tag new">New today</span>' : ""}
          ${hasMail ? '<span class="tag mail">Direct email</span>' : ""}
          <span class="tag">Found ${esc((j.found_at || "").slice(0, 10))}</span>
        </div>
      </div>
      <div class="score">${(j.match_score ?? "–")}%</div>
    </div>
    <div class="body">
      <div class="sec"><div class="h">Why it's good for you</div>
        ${bullets(j.why_good) || `<div class="t">${esc(j.reason)}</div>`}</div>
      <div class="sec"><div class="h">Job details</div>
        ${bullets(j.details) || `<div class="t">${esc(j.reason)}</div>`}</div>
      <div class="actions">
        ${state === "applied"
          ? `<a class="btn" href="${esc(j.url)}" target="_blank" rel="noopener">View on VDAB</a>
             <button class="btn undo" data-act="unapply">Mark not applied</button>`
          : `<button class="btn primary" data-act="generate">✍️ Write my letter</button>
             <a class="btn" href="${esc(j.url)}" target="_blank" rel="noopener">VDAB</a>
             ${state === "skipped"
               ? '<button class="btn" data-act="unskip">Un-skip</button>'
               : '<button class="btn" data-act="skip">Skip</button>'}`}
      </div>
      <div class="prep"></div>
    </div>`;

  el.addEventListener("click", (e) => {
    const act = (e.target.closest("[data-act]") || {}).dataset?.act;
    if (!act) return;
    if (act === "toggle") { el.classList.toggle("open"); return; }
    if (act === "generate") { prepareJob(j, el.querySelector(".prep")); return; }
    if (act === "skip") { setStatus(j.id, "skipped"); toast("Skipped"); return; }
    if (act === "unskip" || act === "unapply") { setStatus(j.id, null); return; }
  });
  return el;
}

function listingCard(j) {
  const el = document.createElement("div");
  el.className = "card";
  el.innerHTML = `
    <div class="top">
      <div style="flex:1">
        <div class="title">${esc(j.title)}</div>
        <div class="co">VDAB · #${esc(j.id)}</div>
      </div>
    </div>
    <div class="actions">
      <button class="btn primary" data-act="generate">✍️ Write my letter</button>
      <a class="btn" href="${esc(j.url)}" target="_blank" rel="noopener">VDAB</a>
    </div>
    <div class="prep"></div>`;
  el.addEventListener("click", (e) => {
    const act = (e.target.closest("[data-act]") || {}).dataset?.act;
    if (act === "generate") prepareJob(j, el.querySelector(".prep"));
  });
  return el;
}

// A "not a fit" card: shows exactly which experience / licence / qualification
// the CV is missing for this job, so you can audit the filtering.
function rejectedCard(j) {
  const el = document.createElement("div");
  el.className = "card";
  el.innerHTML = `
    <div class="top" data-act="toggle">
      <div style="flex:1">
        <div class="title">${esc(j.title)}</div>
        <div class="co">${esc(j.company)} · ${esc(j.location)}</div>
        <div class="tags">
          <span class="tag">Not a fit</span>
          <span class="tag">Found ${esc((j.found_at || "").slice(0, 10))}</span>
        </div>
      </div>
      <div class="score">${(j.match_score ?? "–")}%</div>
    </div>
    <div class="body">
      <div class="sec"><div class="h">Why it's not for you</div>
        ${bullets(j.why_bad) || `<div class="t">${esc(j.reason)}</div>`}</div>
      <div class="sec"><div class="h">Job details</div>
        ${bullets(j.details) || `<div class="t">${esc(j.reason)}</div>`}</div>
      <div class="actions">
        <a class="btn" href="${esc(j.url)}" target="_blank" rel="noopener">View on VDAB anyway</a>
      </div>
    </div>`;
  el.addEventListener("click", (e) => {
    const act = (e.target.closest("[data-act]") || {}).dataset?.act;
    if (act === "toggle") el.classList.toggle("open");
  });
  return el;
}

// Job categories, in the order they appear in Ready. The first one — the kind of
// work you actually want (digital marketing / SEO / web) — is shown at the top.
const CATS = [
  { key: "marketing", label: "🎯 Digital marketing, SEO & web", fav: true,
    rx: /seo|marketing|content|wordpress|\bweb\b|website|social ?media|digital|copywrit|communicat|\bbrand|growth/i },
  { key: "office", label: "🗂️ Office & admin",
    rx: /admin|assistant|office|data ?entry|reception|secretar|back[-\s]?office|payroll|\bhr\b|management support/i },
  { key: "cs", label: "📞 Customer service & sales",
    rx: /customer|client|\bservice|\bsales|account|commercial|helpdesk|call ?cent|support|advisor|inside sales/i },
  { key: "logistics", label: "📦 Logistics & warehouse",
    rx: /logistic|warehouse|packag|freight|supply|order ?pick|magazij|inventory|\bstock|forwarder|dispatch/i },
  { key: "other", label: "💼 Other roles", rx: null },
];
function categorize(j) {
  const t = (j.title || "") + " " + (j.why_good || "");
  for (const c of CATS) if (c.rx && c.rx.test(t)) return c.key;
  return "other";
}

function render() {
  const st = getStatus();
  const buckets = { new: [], applied: [], skipped: [] };
  for (const j of DATA.jobs) {
    const s = st[j.id];
    if (s === "applied") buckets.applied.push(j);
    else if (s === "skipped") buckets.skipped.push(j);
    else buckets.new.push(j);
  }
  const listing = DATA.listing || [];
  const rejected = DATA.rejected || [];

  document.getElementById("c-new").textContent = buckets.new.length || "";
  document.getElementById("c-all").textContent = listing.length || "";
  document.getElementById("c-rejected").textContent = rejected.length || "";
  document.getElementById("c-applied").textContent = buckets.applied.length || "";
  document.getElementById("c-skipped").textContent = buckets.skipped.length || "";
  document.getElementById("updated").textContent =
    DATA.updated ? "Updated " + DATA.updated : "No data yet — the bot hasn't run.";

  document.querySelectorAll(".tab").forEach((t) =>
    t.classList.toggle("on", t.dataset.tab === TAB));

  const list = document.getElementById("list");
  list.innerHTML = "";

  if (TAB === "all") {
    if (!listing.length) {
      list.innerHTML = '<div class="empty"><div class="big">🌐</div>Building the English-jobs list…<br>The bot fills this each hour.</div>';
      return;
    }
    const q = SEARCH_Q.trim().toLowerCase();
    const shown = q ? listing.filter((j) => (j.title || "").toLowerCase().includes(q)) : listing;
    list.insertAdjacentHTML("beforeend",
      `<input id="filter" class="filter" type="search" inputmode="search"
        placeholder="Filter ${listing.length} English jobs (e.g. developer, sales, driver)…"
        value="${esc(SEARCH_Q)}">`);
    const fld = document.getElementById("filter");
    fld.addEventListener("input", () => { SEARCH_Q = fld.value; renderList(shownAfterInput()); });
    function shownAfterInput() {
      const qq = fld.value.trim().toLowerCase();
      return qq ? listing.filter((j) => (j.title || "").toLowerCase().includes(qq)) : listing;
    }
    function renderList(items) {
      [...list.querySelectorAll(".card, .hint, .empty")].forEach((n) => n.remove());
      list.insertAdjacentHTML("beforeend",
        `<div class="hint" style="margin:2px 0 12px">${items.length} of ${listing.length} English jobs. Tap “Open on VDAB” to view; the “Ready” tab has the ones with a letter already written.</div>`);
      if (!items.length) { list.insertAdjacentHTML("beforeend", '<div class="empty">No jobs match that filter.</div>'); return; }
      const frag = document.createDocumentFragment();
      items.slice(0, 400).forEach((j) => frag.appendChild(listingCard(j)));
      list.appendChild(frag);
      if (items.length > 400)
        list.insertAdjacentHTML("beforeend", `<div class="hint">Showing first 400 — type to narrow down.</div>`);
    }
    renderList(shown);
    if (SEARCH_Q) fld.focus();
    return;
  }

  if (TAB === "rejected") {
    if (!rejected.length) {
      list.innerHTML = '<div class="empty"><div class="big">🧹</div>Nothing filtered out yet.<br>Jobs that need experience, a licence or a qualification you don’t have show up here — with the reason.</div>';
      return;
    }
    list.insertAdjacentHTML("beforeend",
      `<div class="hint" style="margin:2px 0 12px">${rejected.length} jobs filtered out because your CV is missing what they require. Tap one to see exactly what was missing.</div>`);
    rejected.forEach((j) => list.appendChild(rejectedCard(j)));
    return;
  }

  const jobs = buckets[TAB];
  if (!jobs.length) {
    const msg = {
      new: ["🔍", "No prepared matches yet.<br>Check the “All jobs” tab for the full English list."],
      applied: ["📮", "Jobs you apply to show up here."],
      skipped: ["🗂️", "Nothing skipped."],
    }[TAB];
    list.innerHTML = `<div class="empty"><div class="big">${msg[0]}</div>${msg[1]}</div>`;
    return;
  }
  if (TAB === "new") {
    // Group Ready jobs by category, favourite category first, highest score first.
    const groups = {};
    jobs.forEach((j) => { (groups[categorize(j)] ||= []).push(j); });
    CATS.forEach((c) => {
      const arr = (groups[c.key] || []).sort((a, b) => (b.match_score || 0) - (a.match_score || 0));
      if (!arr.length) return;
      list.insertAdjacentHTML("beforeend",
        `<div class="cathead${c.fav ? " fav" : ""}">${c.label}<span class="cnt">${arr.length}</span><span class="rule"></span></div>`);
      arr.forEach((j) => list.appendChild(card(j, null)));
    });
    return;
  }
  const state = TAB === "new" ? null : TAB;
  jobs.forEach((j) => list.appendChild(card(j, state)));
}

document.querySelectorAll(".tab").forEach((t) =>
  t.addEventListener("click", () => { TAB = t.dataset.tab; render(); }));

fetch("jobs.json?t=" + Date.now())
  .then((r) => r.json())
  .then((d) => { DATA = d; render(); })
  .catch(() => { document.getElementById("updated").textContent = "Could not load jobs.json."; });

// ---- PWA: install prompt + service worker ----
let deferredPrompt = null;
const installBtn = document.getElementById("install");
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault(); deferredPrompt = e; installBtn.style.display = "inline-block";
});
installBtn.addEventListener("click", async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null; installBtn.style.display = "none";
});
window.addEventListener("appinstalled", () => { installBtn.style.display = "none"; });

if ("serviceWorker" in navigator) {
  let reloaded = false;
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if (reloaded) return; reloaded = true; location.reload();
  });
  window.addEventListener("load", async () => {
    try {
      const reg = await navigator.serviceWorker.register("sw.js", { updateViaCache: "none" });
      reg.update();
      reg.addEventListener("updatefound", () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener("statechange", () => {
          // A new version installed while an old one controls the page:
          // activate it immediately so the user gets the update.
          if (nw.state === "installed" && navigator.serviceWorker.controller) {
            nw.postMessage("skip-waiting");
          }
        });
      });
    } catch {}
  });
}
</script>
</body>
