name: VDAB job bot

on:
  push:
    branches: [main]
    paths:
      # Only re-run when the code changes — NOT when the bot commits its
      # own results (docs/jobs.json, seen.json), which would cause a loop.
      - "bot.py"
      - ".github/workflows/run_bot.yml"
  schedule:
    - cron: "15 6-20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: job-bot
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright
          python -m playwright install --with-deps chromium

      - name: Run the bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -u bot.py

      - name: Commit results
        run: |
          git config user.name "job-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/jobs.json seen.json
          git diff --cached --quiet || git commit -m "Update jobs $(date -u +'%Y-%m-%d %H:%M')"
          git push
