name: VDAB job bot

on:
  push:
    branches: [main]
    paths:
      # Only re-run when the code changes — NOT when the bot commits its
      # own results (docs/jobs.json, seen.json), which would cause a loop.
      - "bot.py"
      - ".github/workflows/run_bot.yml"
  schedule:
    # Comprehensive runs are long (deep paging + reading each posting), so run a
    # few times a day rather than hourly. Progress is checkpointed within each run.
    - cron: "0 5,11,17,23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: job-bot
  # Queue runs instead of cancelling — a long backfill run must not be killed
  # (and lose its progress) by the next scheduled run firing.
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright
          python -m playwright install --with-deps chromium

      - name: Run the bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -u bot.py

      - name: Commit results
        run: |
          git config user.name "job-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/jobs.json seen.json screen.json docs/prepared
          git diff --cached --quiet || git commit -m "Update jobs $(date -u +'%Y-%m-%d %H:%M')"
          git push
